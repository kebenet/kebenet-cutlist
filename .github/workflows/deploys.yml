name: Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Cache apt-packages for lftp
        uses: actions/cache@v4
        id: apt-cache # Give an id to refer to cache hit status
        with:
          path: /var/cache/apt/archives # Directory where apt stores downloaded .deb files
          key: ${{ runner.os }}-apt-lftp-${{ hashFiles('**/lockfiles') }} # Adjust key as needed
          restore-keys: |
            ${{ runner.os }}-apt-lftp-

      - name: Install lftp
        run: |
          # Update only if cache was not hit, or if you always want the latest list
          # A more robust way could be to touch a timestamp file and check its age.
          # For simplicity here, we update if not restored, or you might choose to always update.
          if [[ ${{ steps.apt-cache.outputs.cache-hit }} != 'true' ]]; then
            echo "APT cache not restored, updating apt lists."
            sudo apt-get update
          else
            echo "APT cache restored."
          fi
          sudo apt-get install -y lftp
          echo "LFTP version:"
          lftp --version

      - name: Perform FTP Upload with lftp
        run: |
          echo "lftp will run here..."
          lftp -d -u "u765565545.renovajob,Re.No.VA1" ftp.img.kebenet.com -e "
            set ftp:ssl-allow no;
            set dns:order \"inet\"; # Often helpful
            mirror --reverse \
                   --delete-first \
                   --verbose \
                   --exclude-glob .git* \
                   --exclude .git/ \
                   --exclude .github/ \
                   src/ ;
            echo 'Mirror complete. Bye!';
            bye;
          "
          echo "FTP upload attempt finished."
          
      - name: Report deployment
        run: echo "Deployment to FTP server successful - KEBENET©"
